name: Lint

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match deploy.yml + e2e.yml — Vite + the root `"type": "module"`
          # combination is sensitive to Node major version (Node 20 fails to
          # resolve `vite` from the temp config bundle in some cases). Pinning
          # all three workflows to 22 removes a class of "passes locally,
          # fails in CI" surprises.
          node-version: '22'
          cache: 'npm'

      # Type-aware lint rules need server's and client's own type declarations,
      # so install all three trees. Root install pulls eslint + prettier.
      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install server dependencies
        run: npm install --no-audit --no-fund --prefix server

      - name: Install client dependencies
        run: npm install --no-audit --no-fund --prefix client

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Check .env.example drift
        run: npm run check:env

      - name: Server unit tests
        # The server's vitest suite (~200 tests, no DB required) gates merges
        # the same way lint and prettier do. Catching a riskEngine regression
        # at PR time is much cheaper than catching it at deploy time.
        working-directory: server
        run: npx vitest run --reporter=dot
