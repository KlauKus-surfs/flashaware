name: Deploy to Fly.io

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: API + SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client SPA
        working-directory: client
        env:
          VITE_WS_URL: https://lightning-risk-api.fly.dev
        run: |
          npm ci
          npm run build

      - name: Stage SPA + parser into server build context
        run: |
          rm -rf server/client-dist
          cp -r client/dist server/client-dist
          cp ingestion/parse_nc_json.py server/parse_nc_json.py

      - name: Install flyctl with retry
        run: |
          for i in 1 2 3; do
            curl -fsSL https://fly.io/install.sh | sh && break
            echo "flyctl install attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy API
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          for i in 1 2 3; do
            flyctl deploy --remote-only && exit 0
            echo "Deploy attempt $i failed (likely transient lease/network); sleeping 45s before retry..."
            sleep 45
          done
          echo "Deploy failed after 3 attempts" >&2
          exit 1

  deploy-ingestion:
    name: Ingestion worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl with retry
        run: |
          for i in 1 2 3; do
            curl -fsSL https://fly.io/install.sh | sh && break
            echo "flyctl install attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy ingestion
        working-directory: ingestion
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          for i in 1 2 3; do
            flyctl deploy --remote-only && exit 0
            echo "Deploy attempt $i failed (likely transient lease/network); sleeping 45s before retry..."
            sleep 45
          done
          echo "Deploy failed after 3 attempts" >&2
          exit 1
