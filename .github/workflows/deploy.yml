name: Deploy to Fly.io

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate deploys on unit tests + lint inline. Previously the deploy ran
  # unconditionally on master push and only the (separate) Lint and E2E
  # workflows held it up via branch protection — which works on GitHub
  # configured well, but is invisible to anyone reading this file. Inline
  # gating makes "no green tests = no deploy" explicit in source.
  test:
    name: Tests + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Install server deps
        run: npm install --no-audit --no-fund --prefix server
      - name: Install client deps
        run: npm install --no-audit --no-fund --prefix client
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: .env.example drift
        run: npm run check:env
      - name: Server unit tests
        # JWT_SECRET placeholder — auth.ts throws at import without it, but
        # the unit tests never sign anything against it.
        working-directory: server
        env:
          JWT_SECRET: deploy-test-job-secret-not-used-anywhere
        run: npx vitest run --reporter=dot

  deploy-api:
    name: API + SPA
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client SPA
        working-directory: client
        env:
          VITE_WS_URL: https://lightning-risk-api.fly.dev
        run: |
          npm ci
          npm run build

      - name: Stage SPA + parser into server build context
        run: |
          rm -rf server/client-dist
          cp -r client/dist server/client-dist
          cp ingestion/parse_nc_json.py server/parse_nc_json.py

      - name: Install flyctl with retry
        run: |
          for i in 1 2 3; do
            curl -fsSL https://fly.io/install.sh | sh && break
            echo "flyctl install attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy API
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          for i in 1 2 3; do
            flyctl deploy --remote-only && exit 0
            echo "Deploy attempt $i failed (likely transient lease/network); sleeping 45s before retry..."
            sleep 45
          done
          echo "Deploy failed after 3 attempts" >&2
          exit 1

# NOTE: a separate `deploy-ingestion` job used to live here. It was decommissioned
# because the API runs EUMETSAT ingestion in-process via server/eumetsatService.ts
# under the same advisory-lock leader gate as the risk engine. The standalone
# Python service was a no-op in prod for months — no EUMETSAT credentials were
# ever set on `lightning-risk-ingestion`, and even if they had been, the app was
# attached to its own Postgres database (`lightning_risk_ingestion`) so its
# writes would never have reached the API. Manual destroy step:
#
#   fly apps destroy lightning-risk-ingestion
#
# is documented in docs/OPERATIONS.md → "Decommissioned services".
