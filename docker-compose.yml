version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lightning-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: lightning
      POSTGRES_PASSWORD: lightning_dev
      POSTGRES_DB: lightning_risk
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightning -d lightning_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
