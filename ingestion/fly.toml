app = "lightning-risk-ingestion"
primary_region = "jnb"  # Johannesburg — closest to South African operations

[build]
  dockerfile = "Dockerfile"

[env]
  EUMETSAT_COLLECTION_ID = "EO:EUM:DAT:0691"
  INGESTION_INTERVAL_SEC = "120"
  PYTHONUNBUFFERED = "1"

# No HTTP service — this is a background worker
# Fly keeps it running as a machine with no exposed ports

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  auto_stop_machines = false
  auto_start_machines = true

[[restart]]
  policy = "always"
  max_retries = 10
